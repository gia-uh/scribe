name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q
      - name: License guard (no GPL/AGPL in the tree)
        run: |
          uv run python - <<'PY'
          import importlib.metadata as m
          bad = []
          for d in m.distributions():
              name = d.metadata["Name"]
              blob = (d.metadata.get("License") or "")
              blob += " " + " ".join(d.metadata.get_all("Classifier") or [])
              low = blob.lower()
              if "gpl" in low and "lgpl" not in low.replace("agpl", ""):
                  bad.append(name)
          if bad:
              raise SystemExit(f"copyleft dependency detected: {sorted(set(bad))}")
          print("license guard OK")
          PY
